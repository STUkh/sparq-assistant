name: "S3: Figma timeout during E2E generation"
scenario: S3
input:
  type: jira
  identifier: "EP-200"
  fixtures:
    jira: fixtures/jira-ticket-login.json
    conventions: fixtures/project-conventions.md
  mcp_errors:
    - source: figma
      error: "Request timeout after 30s"
      code: 408
expected_outputs:
  - path: "e2e/specs/auth/login.spec.ts"
    checks:
      - has_pattern: "import .+ from '.*fixtures'"
      - no_pattern: "from '@playwright/test'"
      - min_test_count: 3
  - path: ".sparq/handoff.json"
    checks:
      - has_pattern: '"status"\s*:\s*"(?:success|partial)"'
      - has_pattern: "[Ff]igma.*(?:timeout|unavailable|fallback)"
      - has_pattern: '"gaps"'
rubrics:
  - error-handling-compliance
  - playwright-syntax
  - format-compliance
  - naming-conventions
  - progress-signal-compliance
  - handoff-compliance
  - assertion-detection
  - executability-check
  - requirement-coverage
