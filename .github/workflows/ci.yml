name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: '22'
          - os: macos-latest
            node: '22'
          - os: windows-latest
            node: '22'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run tests
        run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Check syntax
        run: node --check bin/sparq.mjs
      - name: Check lib modules
        run: |
          for f in bin/lib/*.mjs bin/lib/commands/*.mjs; do
            node --check "$f"
            echo "OK: $f"
          done
      - name: Biome lint
        run: npx @biomejs/biome check .
      - name: Validate JSON configs
        run: |
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            for (const f of ['mcp/atlassian.json','mcp/figma.json','mcp/testrail.json','mcp/playwright.json']) {
              JSON.parse(readFileSync(f, 'utf-8'));
              console.log('OK:', f);
            }
          "
      - name: Validate agent structure
        run: |
          echo "Checking agent required sections..."
          for f in claude/agents/*.md; do
            name=$(basename "$f")
            if ! grep -q '<done_criteria>' "$f"; then
              echo "ERROR: Missing <done_criteria> in $name"
              exit 1
            fi
            if [ "$name" != "sparq-orchestrator.md" ]; then
              if ! grep -q '<references>' "$f"; then
                echo "ERROR: Missing <references> in $name (sub-agents require it)"
                exit 1
              fi
            fi
            if [ "$name" != "sparq-orchestrator.md" ]; then
              if ! grep -qE '<handoff>|## Handoff' "$f"; then
                echo "ERROR: Missing handoff section in $name (sub-agents require it)"
                exit 1
              fi
            fi
          done
          echo "All agent files valid."
      - name: Validate eval cases
        run: |
          echo "Checking eval case YAML files..."
          node --input-type=module -e "
            import { readFileSync, readdirSync } from 'node:fs';
            import { join, resolve } from 'node:path';
            const casesDir = resolve('test/evals/cases');
            const rubrics = readdirSync('test/evals/rubrics');
            for (const f of readdirSync(casesDir).filter(f => f.endsWith('.yaml'))) {
              const raw = readFileSync(join(casesDir, f), 'utf-8');
              const name = raw.match(/^name:\s*(.+)/m)?.[1] || f;
              const scenario = raw.match(/^scenario:\s*(.+)/m)?.[1] || 'unknown';
              console.log('OK:', f, '(' + scenario.trim() + ')');
            }
          "
      - name: Validate MCP configs contain no real credentials
        run: |
          for f in mcp/*.json; do
            if grep -qE '"(sk-|xoxb-|ghp_|ATATT)' "$f"; then
              echo "ERROR: $f may contain real credentials"
              exit 1
            fi
          done
          echo "MCP configs clean — placeholder values only"

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run tests with coverage
        run: |
          node --test --experimental-test-coverage 'test/**/*.test.mjs' 2>&1 | tee coverage-output.txt
          # Extract coverage percentage and fail if below threshold
          COVERAGE=$(grep -oP 'line.*?(\d+\.\d+)%' coverage-output.txt | grep -oP '\d+\.\d+' | head -1)
          if [ -n "$COVERAGE" ]; then
            echo "Coverage: ${COVERAGE}%"
            if (( $(echo "$COVERAGE < 80" | bc -l) )); then
              echo "ERROR: Coverage ${COVERAGE}% is below 80% threshold"
              exit 1
            fi
          fi
